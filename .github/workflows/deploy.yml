name: Deploy web-app to Vercel

# Deploys web-app/ to Vercel on push to main (and on demand).
# Use EITHER this workflow OR Vercel's dashboard Git integration — not both
# (two deployers = double builds). If you use the dashboard integration, delete this file.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — Vercel → Account Settings → Tokens
#   VERCEL_ORG_ID      — from web-app/.vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID  — same file
# And set GEMINI_API_KEY in the Vercel Project's Environment Variables.

on:
  push:
    branches: [main]
    paths:
      - 'web-app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy (prebuilt)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
