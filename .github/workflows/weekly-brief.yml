name: Weekly Brief

# Runs the agent every Monday and opens a PR with the brief for human review.
# (Human-in-the-loop: it never posts — it proposes.)
on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch: {} # also runnable on demand from the Actions tab

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # 1) deterministic analysis (no tokens)
      - run: npm run analyze

      # 2) the LLM brief (Analyst -> Ideator -> Packager)
      #    NOTE: default provider is `sample`. Swap in a live Apify/X-API provider for real data.
      - run: node scripts/generate-brief.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 3) open a PR with the new brief for a human to approve
      - name: Open PR with the brief
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: weekly content brief'
          branch: weekly-brief-update
          delete-branch: true
          title: 'Weekly content brief'
          body: |
            Auto-generated by the weekly content agent.
            Review, edit, and approve before anything is posted.
          add-paths: |
            briefs/
            output/
